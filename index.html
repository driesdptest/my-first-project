<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rekenapp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Screen 1: Instellingen -->
  <div id="screen-instellingen" class="screen active">
    <h1>Rekenapp 🧮</h1>
    <div class="card">
      <h2>Bewerkingen</h2>
      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="op-plus" value="+"> <span>Optellen (+)</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="op-min" value="-"> <span>Aftrekken (−)</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="op-keer" value="×"> <span>Vermenigvuldigen (×)</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="op-delen" value="÷"> <span>Delen (÷)</span>
        </label>
      </div>

      <h2>Getallen</h2>
      <div class="number-row">
        <label for="min-getal">Van:</label>
        <input type="number" id="min-getal" value="1" min="1">
        <label for="max-getal">Tot:</label>
        <input type="number" id="max-getal" value="10" min="2">
      </div>
      <div class="error-msg" id="getal-error"></div>

      <h2>Aantal oefeningen</h2>
      <div class="number-row">
        <input type="number" id="aantal" value="10" min="1" max="50">
      </div>
      <div class="error-msg" id="aantal-error"></div>

      <button class="btn-primary" id="btn-starten" disabled>Starten! 🚀</button>
    </div>
  </div>

  <!-- Screen 2: Oefening -->
  <div id="screen-oefening" class="screen">
    <h1>Rekenapp 🧮</h1>
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-label" id="progress-label">Vraag 1 van 10</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
      <div class="problem" id="problem-display">7 + 4 = ?</div>
      <div class="answer-wrap">
        <input type="number" id="answer-input" class="answer-input" placeholder="?" autocomplete="off">
      </div>
      <div class="feedback" id="feedback-msg"></div>
      <button class="btn-primary" id="btn-controleren">Controleren ✅</button>
    </div>
  </div>

  <!-- Screen 3: Resultaten -->
  <div id="screen-resultaten" class="screen">
    <h1>Klaar! 🎊</h1>
    <div class="card">
      <div class="stars" id="stars-display">⭐⭐⭐</div>
      <div class="score-display" id="score-display">Je hebt 8 van de 10 sommen goed!</div>
      <div class="result-msg" id="result-msg">Geweldig!</div>
      <div class="btn-row">
        <button class="btn-secondary" id="btn-instellingen">⚙️ Instellingen</button>
        <button class="btn-primary" id="btn-opnieuw">🔄 Opnieuw</button>
      </div>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>
  <script type="module" src="app.js"></script>
</body>
</html>
