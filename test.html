<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Tests — Rekenapp</title>
  <style>body{font-family:monospace;padding:2rem;} .pass{color:green;} .fail{color:red;}</style>
</head>
<body>
<h2>Rekenapp Tests</h2>
<pre id="output"></pre>
<script type="module">
import { generateExercise, generateSession, generateFromPattern } from './exercises.js';

const out = document.getElementById('output');
let passed = 0, failed = 0;

function test(name, fn) {
  try {
    fn();
    out.innerHTML += `<span class="pass">✅ ${name}</span>\n`;
    passed++;
  } catch(e) {
    out.innerHTML += `<span class="fail">❌ ${name}: ${e.message}</span>\n`;
    failed++;
  }
}
function assert(cond, msg) { if (!cond) throw new Error(msg || 'mislukt'); }

const s = { ops: ['+', '-', '×', '÷'], min: 1, max: 10, aantal: 10 };

test('optelling: antwoord klopt', () => {
  for (let i = 0; i < 50; i++) {
    const ex = generateExercise({ ...s, ops: ['+'] });
    assert(ex.answer === ex.a + ex.b, `${ex.a}+${ex.b}≠${ex.answer}`);
  }
});

test('aftrekking: resultaat >= 0 en antwoord klopt', () => {
  for (let i = 0; i < 50; i++) {
    const ex = generateExercise({ ...s, ops: ['-'] });
    assert(ex.answer >= 0, `${ex.a}-${ex.b}=${ex.answer} < 0`);
    assert(ex.answer === ex.a - ex.b, `${ex.a}-${ex.b}≠${ex.answer}`);
  }
});

test('vermenigvuldigen: antwoord klopt', () => {
  for (let i = 0; i < 50; i++) {
    const ex = generateExercise({ ...s, ops: ['×'] });
    assert(ex.answer === ex.a * ex.b, `${ex.a}×${ex.b}≠${ex.answer}`);
  }
});

test('delen: geheel getal, niet door nul, antwoord klopt', () => {
  for (let i = 0; i < 50; i++) {
    const ex = generateExercise({ ...s, ops: ['÷'] });
    assert(ex.b !== 0, 'deling door nul');
    assert(Number.isInteger(ex.answer), `${ex.a}÷${ex.b}=${ex.answer} is geen geheel getal`);
    assert(ex.answer === ex.a / ex.b, `${ex.a}÷${ex.b}≠${ex.answer}`);
  }
});

test('optelling: getallen binnen bereik', () => {
  for (let i = 0; i < 50; i++) {
    const ex = generateExercise({ ...s, ops: ['+'] });
    assert(ex.a >= 1 && ex.a <= 10, `a=${ex.a} buiten bereik`);
    assert(ex.b >= 1 && ex.b <= 10, `b=${ex.b} buiten bereik`);
  }
});

test('sessie heeft juist aantal oefeningen', () => {
  const session = generateSession(s);
  assert(session.length === 10, `verwacht 10, kreeg ${session.length}`);
});

test('sessie heeft unieke oefeningen', () => {
  const session = generateSession(s);
  const keys = session.map(e => `${e.a}${e.op}${e.b}`);
  const unique = new Set(keys);
  assert(unique.size === keys.length, `duplicaten gevonden`);
});

test('sessie met klein bereik vult correct aan', () => {
  const session = generateSession({ ops: ['+'], min: 1, max: 3, aantal: 50 });
  assert(session.length === 50, `verwacht 50, kreeg ${session.length}`);
});

const pat = { fixed: 9, op: '-', min: 1, max: 8 };

test('generateFromPattern: optelling antwoord klopt', () => {
  for (let i = 0; i < 50; i++) {
    const ex = generateFromPattern({ fixed: 6, op: '+', min: 1, max: 5 });
    assert(ex.a === 6, `a moet 6 zijn, got ${ex.a}`);
    assert(ex.answer === ex.a + ex.b, `${ex.a}+${ex.b}≠${ex.answer}`);
    assert(ex.b >= 1 && ex.b <= 5, `b=${ex.b} buiten bereik`);
  }
});

test('generateFromPattern: aftrekking niet negatief', () => {
  for (let i = 0; i < 50; i++) {
    const ex = generateFromPattern(pat);
    assert(ex.a === 9, `a moet 9 zijn`);
    assert(ex.answer >= 0, `antwoord ${ex.answer} is negatief`);
    assert(ex.answer === ex.a - ex.b, `${ex.a}-${ex.b}≠${ex.answer}`);
  }
});

test('generateFromPattern: vermenigvuldigen klopt', () => {
  for (let i = 0; i < 50; i++) {
    const ex = generateFromPattern({ fixed: 4, op: '×', min: 1, max: 10 });
    assert(ex.a === 4, `a moet 4 zijn`);
    assert(ex.answer === ex.a * ex.b, `${ex.a}×${ex.b}≠${ex.answer}`);
  }
});

test('generateFromPattern: deling geeft geheel getal', () => {
  for (let i = 0; i < 50; i++) {
    const ex = generateFromPattern({ fixed: 12, op: '÷', min: 1, max: 6 });
    assert(ex.a === 12, `a moet 12 zijn`);
    assert(ex.b !== 0, 'deling door nul');
    assert(Number.isInteger(ex.answer), `${ex.a}÷${ex.b}=${ex.answer} is geen geheel getal`);
    assert(ex.a / ex.b === ex.answer, `${ex.a}÷${ex.b}≠${ex.answer}`);
  }
});

test('generateSession met patterns: juist aantal', () => {
  const patterns = [
    { fixed: 9, op: '-', min: 1, max: 8 },
    { fixed: 5, op: '+', min: 1, max: 5 },
  ];
  const session = generateSession({ patterns, aantal: 10 });
  assert(session.length === 10, `verwacht 10, kreeg ${session.length}`);
});

test('generateSession met patterns: alleen opgegeven bewerkingen', () => {
  const patterns = [{ fixed: 9, op: '-', min: 1, max: 8 }];
  const session = generateSession({ patterns, aantal: 10 });
  session.forEach(ex => {
    assert(ex.a === 9, `a moet 9 zijn, got ${ex.a}`);
    assert(ex.op === '-', `bewerking moet - zijn, got ${ex.op}`);
  });
});

test('generateFromPattern: deling met priemgetal valt terug op b=1', () => {
  // 7 is prime; only divisors are 1 and 7; range [2,6] has no divisors of 7
  for (let i = 0; i < 20; i++) {
    const ex = generateFromPattern({ fixed: 7, op: '÷', min: 2, max: 6 });
    assert(ex.a === 7, `a moet 7 zijn`);
    assert(ex.b === 1, `b moet 1 zijn (fallback), got ${ex.b}`);
    assert(ex.answer === 7, `antwoord moet 7 zijn, got ${ex.answer}`);
  }
});

out.innerHTML += `\n<strong>${passed} geslaagd, ${failed} mislukt</strong>\n`;
</script>
</body>
</html>
